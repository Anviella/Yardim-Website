<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yardim | Status Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Index'teki Arka Plan Parlaması */
        .bg-glow {
            position: fixed;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.15) 0%, rgba(0, 210, 255, 0) 70%);
            filter: blur(100px);
            z-index: 0;
            animation: moveGlow 15s infinite alternate ease-in-out;
        }

        @keyframes moveGlow {
            0% { transform: translate(-30%, -30%); }
            100% { transform: translate(30%, 30%); }
        }

        /* Status Paneli (Hero Card stiliyle aynı) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 50px 40px;
            border-radius: 35px;
            width: 90%;
            max-width: 650px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            position: relative;
            z-index: 1;
        }

        h1 { 
            font-size: 2.5rem; 
            font-weight: 900; 
            margin-bottom: 30px; 
            letter-spacing: -1px;
            text-transform: none; /* Index'teki gibi doğal yazı */
        }

        /* İstatistik Kartları (Stat Box stiliyle aynı) */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 25px;
            border-radius: 20px;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
        }

        .stat-value { 
            display: block; 
            font-size: 1.8rem; 
            font-weight: 900; 
            color: #ffffff; /* Beyaz değerler */
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .stat-label { 
            font-size: 0.75rem; 
            color: #888; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            margin-top: 8px; 
            font-weight: 600;
        }

        /* Status Badges (Hero Badge stiliyle aynı) */
        .status-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background-color: #2ecc71;
            border-radius: 50%;
            box-shadow: 0 0 8px #2ecc71;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Back Button (Nav-btn stiliyle aynı) */
        .back-btn {
            display: inline-block;
            padding: 12px 25px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: #ffffff;
            transform: translateY(-2px);
        }

        /* Discord spesifik renk */
        .discord-badge .online-dot { background-color: #5865F2; box-shadow: 0 0 8px #5865F2; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="glass-panel">
        <h1>System Status</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <span id="latency-val" class="stat-value">...</span>
                <span class="stat-label">Latency</span>
            </div>
            <div class="stat-card">
                <span id="ram-val" class="stat-value">...</span>
                <span class="stat-label">RAM Usage</span>
            </div>
            <div class="stat-card">
                <span id="loc-val" class="stat-value">...</span>
                <span class="stat-label">Location</span>
            </div>
            <div class="stat-card">
                <span id="uptime-val" class="stat-value">...</span>
                <span class="stat-label">Uptime</span>
            </div>
        </div>

        <div class="status-container">
            <div id="fluxer-status" class="status-badge">
                <div class="online-dot"></div>
                Fluxer: Checking...
            </div>
            <div id="discord-status" class="status-badge discord-badge">
                <div class="online-dot"></div>
                Discord: Online
            </div>
        </div>

        <a href="index.html" class="back-btn">
            <i class="fa-solid fa-arrow-left" style="margin-right: 8px;"></i> Back to Main Site
        </a>
    </div>

    <script>
        async function updateStats() {
            try {
                const response = await fetch('https://yardim-production.up.railway.app/api/status');
                const data = await response.json();

                document.getElementById('latency-val').innerText = data.latency;
                document.getElementById('ram-val').innerText = data.ramUsage;
                document.getElementById('loc-val').innerText = data.location;
                document.getElementById('uptime-val').innerText = data.uptime;
                
                document.getElementById('fluxer-status').innerHTML = `<div class="online-dot"></div> Fluxer: ${data.fluxer_status}`;
                
                console.log("Stats updated successfully");
            } catch (error) {
                console.error("API Error:", error);
                document.getElementById('fluxer-status').innerHTML = `<div class="online-dot" style="background:#ff4d4d; box-shadow:0 0 8px #ff4d4d;"></div> Fluxer: Offline`;
            }
        }

        updateStats();
        setInterval(updateStats, 30000);
    </script>
    <script>
        async function updateStats() {
            try {
                // Veriyi API'den çekiyoruz
                const response = await fetch('https://yardim-production.up.railway.app/api/status');
                const data = await response.json();

                // Veriyi API'den aldığın satırın altını böyle düzenle:
let rawLocation = data.location; 

// 1. Önce virgül varsa virgülden sonrasını atar
let cleanLocation = rawLocation.split(',')[0];

// 2. REGEX kullanarak: Sadece harf ve boşlukları tutar, 
// bayrak kodlarını (emoji parçalarını) ve sembolleri siler.
cleanLocation = cleanLocation.replace(/[^a-zA-Z\s]/g, '').trim();

// Ekrana bas
document.getElementById('loc-val').innerText = cleanLocation;

                // DİKKAT: Burası senin istediğin düzenlemeyi yapan yer
                // Eğer veri "Eastern US, US" gelirse sadece "Eastern US" kısmını alır
                let locationText = data.location;
                if (locationText.includes(',')) {
                    locationText = locationText.split(',')[0].trim();
                }

                // Ekrana temizlenmiş veriyi basıyoruz
                document.getElementById('loc-val').innerText = locationText;
                
                // Diğer değerleri de güncelleyelim (varsa)
                if(data.latency) document.getElementById('latency-val').innerText = data.latency;
                if(data.ramUsage) document.getElementById('ram-val').innerText = data.ramUsage;

            } catch (error) {
                console.error("Veri çekilirken hata oluştu:", error);
            }
        }

        // Sayfa açıldığında çalıştır
        updateStats();
        // Her 30 saniyede bir veriyi yenile (otomatik güncelleme için)
        setInterval(updateStats, 30000);
    </script>
    
</body>
</html>
