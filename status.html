<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yardim | Status Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        .bg-glow {
            position: fixed;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.15) 0%, rgba(0, 210, 255, 0) 70%);
            filter: blur(100px);
            z-index: 0;
            animation: moveGlow 15s infinite alternate ease-in-out;
        }

        @keyframes moveGlow {
            0% { transform: translate(-30%, -30%); }
            100% { transform: translate(30%, 30%); }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px;
            border-radius: 35px;
            width: 90%;
            max-width: 650px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            position: relative;
            z-index: 1;
        }

        .bot-avatar {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            margin-bottom: 30px;
        }

        h1 { font-size: 2.2rem; font-weight: 900; margin-bottom: 25px; letter-spacing: -1px; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
            justify-items: center; /* Kartları grid içerisinde ortalar */
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 22px;
            border-radius: 20px;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%; /* Kartların genişliğini eşitler */
        }

        /* Opened Tickets kartını alt satırda ortalamak için */
        .stat-card.centered-last {
            grid-column: 1 / span 2;
            max-width: calc(50% - 7.5px); /* Diğer kartlarla aynı genişlikte olması için */
        }

        .stat-card:hover { 
            transform: translateY(-5px);
            border-color: #ffffff;
        }
        
        .stat-val { font-size: 1.4rem; font-weight: 900; color: #ffffff; text-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .stat-label { font-size: 0.85rem; color: #888; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 5px; font-weight: 600; }

        .online-dot {
            width: 10px; height: 10px;
            background-color: #2ecc71;
            border-radius: 50%;
            box-shadow: 0 0 8px #2ecc71;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="glass-panel">
        <div class="hero-card">
            <div class="avatar-container">
                <img src="https://i.ibb.co/VpqK26mh/Yard-m-Profile-Picture.png" alt="Bot Avatar" class="bot-avatar">
            </div>
        </div>
        
        <h1>System Status</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <span id="latency-val" class="stat-val">...</span>
                <span class="stat-label">Latency</span>
            </div>

            <div class="stat-card">
                <span id="ram-val" class="stat-val">...</span>
                <span class="stat-label">RAM Usage</span>
            </div>

            <div class="stat-card">
                <span id="loc-val" class="stat-val">...</span>
                <span class="stat-label">Location</span>
            </div>

            <div class="stat-card">
                <span id="uptime-val" class="stat-val">...</span>
                <span class="stat-label">Uptime</span>
            </div>
            
            <div class="stat-card centered-last">
                <span id="tickets-opened" class="stat-val">...</span>
                <span class="stat-label">Opened Tickets</span>
            </div>
        </div>

        <div class="status-container" style="display: flex; justify-content: center; margin-bottom: 30px;">
            <div id="fluxer-status" style="display: inline-flex; align-items: center; gap: 10px; padding: 15px 35px; background: rgba(255, 255, 255, 0.06); color: #ffffff; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); font-size: 1.1rem; font-weight: 700; transition: 0.3s;">
                <div id="status-dot" class="online-dot"></div>
                Fluxer: Checking...
            </div>
        </div>

        <a href="index.html" style="display: inline-block; padding: 12px 20px; border-radius: 12px; font-size: 0.9rem; font-weight: 700; text-decoration: none; color: white; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s;">
            <i class="fa-solid fa-arrow-left" style="margin-right: 8px;"></i> Back to Main Page
        </a>
    </div>

<script>
async function updateStatus() {
    const fluxDot = document.getElementById('status-dot');
    const fluxStatusBox = document.getElementById('fluxer-status');

    try {
        const API_URL = 'https://yardim-production.up.railway.app/api/status'; 
        const response = await fetch(API_URL);
        const data = await response.json();

        // İstatistikleri Güncelle
        document.getElementById('latency-val').innerText = data.latency || "0ms";
        document.getElementById('ram-val').innerText = data.ramUsage || "0MB";
        document.getElementById('uptime-val').innerText = data.uptime || "0h";
        document.getElementById('tickets-opened').innerText = data.openedTickets || "0";
        document.getElementById('loc-val').innerText = data.location || "Germany";

        // Fluxer Durumu
        if (data.fluxer_status === "Online") {
            fluxDot.style.backgroundColor = "#2ecc71";
            fluxDot.style.boxShadow = "0 0 10px #2ecc71";
            fluxStatusBox.childNodes[2].nodeValue = " Fluxer: Online";
        } else {
            fluxDot.style.backgroundColor = "#e74c3c";
            fluxDot.style.boxShadow = "0 0 10px #e74c3c";
            fluxStatusBox.childNodes[2].nodeValue = " Fluxer: Offline";
        }
        
    } catch (error) {
        console.error("Hata:", error);
        fluxDot.style.backgroundColor = "#e74c3c";
        fluxStatusBox.childNodes[2].nodeValue = " Fluxer: Offline";
        
        const vals = ['latency-val', 'ram-val', 'uptime-val', 'tickets-opened', 'loc-val'];
        vals.forEach(id => document.getElementById(id).innerText = "ERR");
    }
}

updateStatus();
setInterval(updateStatus, 30000);
</script>
</body>
</html>
