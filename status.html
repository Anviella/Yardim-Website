<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yardim | Status Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .bg-glow {
            position: fixed;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.15) 0%, rgba(0, 210, 255, 0) 70%);
            filter: blur(100px);
            z-index: 0;
            animation: moveGlow 15s infinite alternate ease-in-out;
        }

        @keyframes moveGlow {
            0% { transform: translate(-30%, -30%); }
            100% { transform: translate(30%, 30%); }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px;
            border-radius: 35px;
            width: 90%;
            max-width: 650px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            position: relative;
            z-index: 1;
        }

        .bot-avatar {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            margin-bottom: 15px;
            object-fit: cover;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 30px; letter-spacing: -1px; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            border-radius: 20px;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-card:hover { transform: translateY(-5px); }
        
        .online-dot {
            width: 10px; height: 10px;
            background-color: #2ecc71;
            border-radius: 50%;
            box-shadow: 0 0 8px #2ecc71;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="glass-panel">
        <img src="" alt="" class="">
        
        <div class="hero-card">
            <div class="avatar-container">
                <img src="https://i.ibb.co/VpqK26mh/Yard-m-Profile-Picture.png" 
                     alt="Bot Avatar" 
                     class="bot-avatar" 
                     style="width: 150px; height: 150px; object-fit: cover; border-radius: 50%; box-shadow: 0 10px 20px rgba(0,0,0,0.3); border: none;">
            </div>
        </div>
        
        <h1>System Status</h1>
        
        <div class="stats-grid">
            <div class="stat-card" style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 22px;" onmouseover="this.style.borderColor='#ffffff';" onmouseout="this.style.borderColor='rgba(255, 255, 255, 0.1)';">
                <span id="latency-val" style="font-size: 1.4rem; font-weight: 900; color: #ffffff; text-shadow: 0 0 15px rgba(255,255,255,0.2);">...</span>
                <span style="font-size: 0.90rem; color: #888; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 5px; font-weight: 600;">Latency</span>
            </div>

            <div class="stat-card" style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 22px;" onmouseover="this.style.borderColor='#ffffff';" onmouseout="this.style.borderColor='rgba(255, 255, 255, 0.1)';">
                <span id="ram-val" style="font-size: 1.4rem; font-weight: 900; color: #ffffff; text-shadow: 0 0 15px rgba(255,255,255,0.2);">...</span>
                <span style="font-size: 0.90rem; color: #888; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 5px; font-weight: 600;">RAM Usage</span>
            </div>

            <div class="stat-card" style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 22px;" onmouseover="this.style.borderColor='#ffffff';" onmouseout="this.style.borderColor='rgba(255, 255, 255, 0.1)';">
                <span id="loc-val" style="font-size: 1.4rem; font-weight: 900; color: #ffffff; text-shadow: 0 0 15px rgba(255,255,255,0.2);">...</span>
                <span style="font-size: 0.90rem; color: #888; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 5px; font-weight: 600;">Location</span>
            </div>

            <div class="stat-card" style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 22px;" onmouseover="this.style.borderColor='#ffffff';" onmouseout="this.style.borderColor='rgba(255, 255, 255, 0.1)';">
                <span id="uptime-val" style="font-size: 1.4rem; font-weight: 900; color: #ffffff; text-shadow: 0 0 15px rgba(255,255,255,0.2);">...</span>
                <span style="font-size: 0.90rem; color: #888; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 5px; font-weight: 600;">Uptime</span>
            </div>
        </div>

        <div class="status-container" style="display: flex; justify-content: center; margin-bottom: 30px;">
            <div id="fluxer-status" style="display: inline-flex; align-items: center; gap: 10px; padding: 15px 35px; background: rgba(255, 255, 255, 0.06); color: #ffffff; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); font-size: 1.1rem; font-weight: 700; z-index: 5; transition: 0.3s;" onmouseover="this.style.borderColor='#ffffff'; this.style.background='rgba(255, 255, 255, 0.1)'; " onmouseout="this.style.borderColor='rgba(255, 255, 255, 0.1)'; this.style.background='rgba(255, 255, 255, 0.06)';">
                <div class="online-dot"></div>
                Fluxer: Checking...
            </div>
        </div>

        <a href="index.html" style="display: inline-block; padding: 12px 20px; border-radius: 12px; font-size: 0.9rem; font-weight: 700; text-decoration: none; color: white; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s; position: relative; z-index: 10;" onmouseover="this.style.background='rgba(255, 255, 255, 0.15)'; this.style.borderColor='#ffffff';" onmouseout="this.style.background='rgba(255, 255, 255, 0.05)'; this.style.borderColor='rgba(255, 255, 255, 0.1)';">
            <i class="fa-solid fa-arrow-left" style="margin-right: 8px;"></i> Back to Main Page
        </a>
    </div>

    <script>
        async function updateStats() {
            try {
                const response = await fetch('https://yardim-production.up.railway.app/api/status');
                const data = await response.json();

                document.getElementById('latency-val').innerText = data.latency;
                document.getElementById('ram-val').innerText = data.ramUsage;
                document.getElementById('uptime-val').innerText = data.uptime;

                let locationName = data.location || "";
                if (locationName.includes("USA") || locationName.includes("United States")) {
                    document.getElementById('loc-val').innerText = locationName + " 🇺🇸";
                } else {
                    document.getElementById('loc-val').innerText = locationName;
                }
                
                document.getElementById('fluxer-status').innerHTML = `<div class="online-dot"></div> Fluxer: ${data.fluxer_status}`;
                
            } catch (error) {
                document.getElementById('fluxer-status').innerHTML = `<div class="online-dot" style="background:#ff4d4d; box-shadow:0 0 8px #ff4d4d;"></div> Fluxer: Offline`;
            }
        }

        updateStats();
        setInterval(updateStats, 30000);
    </script>
</body>
</html>
